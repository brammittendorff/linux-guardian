name: Release

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build release for'
        required: true

permissions:
  contents: write
  pages: write
  id-token: write
  attestations: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-packages:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Debian/Ubuntu packages (.deb)
          - name: Debian 12 (Bookworm) amd64
            distro: debian
            version: bookworm
            arch: amd64
            package_type: deb
            container: debian:bookworm

          - name: Debian 11 (Bullseye) amd64
            distro: debian
            version: bullseye
            arch: amd64
            package_type: deb
            container: debian:bullseye

          - name: Ubuntu 24.04 (Noble) amd64
            distro: ubuntu
            version: noble
            arch: amd64
            package_type: deb
            container: ubuntu:noble

          - name: Ubuntu 22.04 (Jammy) amd64
            distro: ubuntu
            version: jammy
            arch: amd64
            package_type: deb
            container: ubuntu:jammy

          # RPM packages (Fedora/RHEL/Rocky)
          - name: Fedora 40 x86_64
            distro: fedora
            version: "40"
            arch: x86_64
            package_type: rpm
            container: fedora:40

          - name: Fedora 39 x86_64
            distro: fedora
            version: "39"
            arch: x86_64
            package_type: rpm
            container: fedora:39

          - name: Rocky Linux 9 x86_64
            distro: rockylinux
            version: "9"
            arch: x86_64
            package_type: rpm
            container: rockylinux:9

          # Arch Linux packages
          - name: Arch Linux x86_64
            distro: arch
            version: latest
            arch: x86_64
            package_type: pkg.tar.zst
            container: archlinux:latest

          # Alpine Linux (musl-based)
          - name: Alpine Linux 3.19 x86_64
            distro: alpine
            version: "3.19"
            arch: x86_64
            package_type: apk
            container: alpine:3.19

    container: ${{ matrix.container }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install dependencies (Debian/Ubuntu)
        if: matrix.package_type == 'deb'
        run: |
          apt-get update
          apt-get install -y curl build-essential pkg-config libssl-dev git ca-certificates bash dpkg-dev debhelper gnupg

      - name: Install dependencies (Fedora/Rocky)
        if: matrix.package_type == 'rpm'
        run: |
          if command -v dnf &> /dev/null; then
            dnf upgrade -y --refresh || dnf upgrade -y
            dnf install -y gcc gcc-c++ make pkgconfig openssl-devel git bash rpm-build rpmdevtools gnupg2
          else
            yum upgrade -y
            yum install -y gcc gcc-c++ make pkgconfig openssl-devel git bash rpm-build rpmdevtools gnupg2
          fi

      - name: Install dependencies (Arch)
        if: matrix.package_type == 'pkg.tar.zst'
        run: |
          pacman -Syu --noconfirm curl base-devel openssl git ca-certificates bash binutils fakeroot gnupg

      - name: Install dependencies (Alpine)
        if: matrix.package_type == 'apk'
        run: |
          apk add --no-cache curl gcc g++ make pkgconfig openssl-dev git ca-certificates musl-dev bash alpine-sdk gnupg

      - name: Import GPG key
        shell: bash
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_AVAILABLE=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          # Configure gpg-agent for non-interactive use
          mkdir -p ~/.gnupg
          echo "allow-preset-passphrase" >> ~/.gnupg/gpg-agent.conf
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye 2>/dev/null || true
          # Test signing to cache passphrase
          echo "test" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --sign --output /dev/null 2>/dev/null || true
          echo "GPG_AVAILABLE=true" >> $GITHUB_ENV

      - name: Install Rust
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable --profile minimal
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          source "$HOME/.cargo/env"

      - name: Get version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.tag }}"
          else
            VERSION="${{ github.event.release.tag_name }}"
          fi
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Building version: $VERSION"

      - name: Set version in Cargo.toml
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^version = \".*\"/version = \"${VERSION}\"/" Cargo.toml
          echo "Set Cargo.toml version to: $VERSION"

      - name: Build release binary
        shell: bash
        run: |
          source "$HOME/.cargo/env"
          cargo build --release --verbose
          strip target/release/linux-guardian || true

      - name: Build DEB package
        if: matrix.package_type == 'deb'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ARCH="${{ matrix.arch }}"
          PKG_NAME="linux-guardian_${VERSION}_${ARCH}"

          mkdir -p "$PKG_NAME/DEBIAN"
          mkdir -p "$PKG_NAME/usr/local/bin"
          mkdir -p "$PKG_NAME/usr/share/doc/linux-guardian"
          mkdir -p "$PKG_NAME/var/cache/linux-guardian"

          cp target/release/linux-guardian "$PKG_NAME/usr/local/bin/"
          chmod 755 "$PKG_NAME/usr/local/bin/linux-guardian"

          cp README.md "$PKG_NAME/usr/share/doc/linux-guardian/" || true
          cp docs/CONTRIBUTING.md "$PKG_NAME/usr/share/doc/linux-guardian/" || true

          cat > "$PKG_NAME/DEBIAN/control" <<EOF
          Package: linux-guardian
          Version: ${VERSION}
          Section: admin
          Priority: optional
          Architecture: ${ARCH}
          Maintainer: Linux Guardian Contributors <noreply@github.com>
          Description: Lightning-fast Linux security scanner
           Detects active threats on your Linux system in 10-30 seconds.
           Built in Rust with 30+ specialized detectors for malware, CVEs,
           rootkits, and network attacks.
          Homepage: https://github.com/brammittendorff/linux-guardian
          EOF

          dpkg-deb --build "$PKG_NAME"
          DEB_FILE="linux-guardian_${VERSION}_${{ matrix.distro }}-${{ matrix.version }}_${ARCH}.deb"
          mv "${PKG_NAME}.deb" "$DEB_FILE"

          echo "Deb package built: $DEB_FILE (signing via repository Release file)"

      - name: Build RPM package
        if: matrix.package_type == 'rpm'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p ~/rpmbuild/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cat > ~/rpmbuild/SPECS/linux-guardian.spec <<EOF
          Name:           linux-guardian
          Version:        ${VERSION}
          Release:        1%{?dist}
          Summary:        Lightning-fast Linux security scanner
          License:        MIT
          URL:            https://github.com/brammittendorff/linux-guardian
          BuildArch:      ${{ matrix.arch }}

          %description
          Detects active threats on your Linux system in 10-30 seconds.
          Built in Rust with 30+ specialized detectors for malware, CVEs,
          rootkits, and network attacks.

          %install
          mkdir -p %{buildroot}/usr/local/bin
          mkdir -p %{buildroot}/var/cache/linux-guardian
          cp ${GITHUB_WORKSPACE}/target/release/linux-guardian %{buildroot}/usr/local/bin/
          chmod 755 %{buildroot}/usr/local/bin/linux-guardian

          %files
          /usr/local/bin/linux-guardian
          %dir /var/cache/linux-guardian

          %changelog
          * $(date "+%a %b %d %Y") GitHub Actions <noreply@github.com> - ${VERSION}-1
          - Automated build for ${{ matrix.name }}
          EOF

          if [ "$GPG_AVAILABLE" = "true" ]; then
            GPG_NAME=$(gpg --list-keys --with-colons | grep '^uid' | head -1 | cut -d: -f10)
            cat > ~/.rpmmacros <<MACROS
          %_signature gpg
          %_gpg_name ${GPG_NAME}
          %__gpg_sign_cmd %{__gpg} gpg --batch --pinentry-mode loopback --no-verbose --no-armor --no-secmem-warning -u "%{_gpg_name}" -sbo %{__signature_filename} %{__plaintext_filename}
          MACROS
          fi

          rpmbuild -bb ~/rpmbuild/SPECS/linux-guardian.spec

          if [ "$GPG_AVAILABLE" = "true" ]; then
            rpm --addsign ~/rpmbuild/RPMS/*/*.rpm || true
          fi

          RPM_FILE="linux-guardian-${VERSION}-1.${{ matrix.distro }}${{ matrix.version }}.${{ matrix.arch }}.rpm"
          find ~/rpmbuild/RPMS -name "*.rpm" -exec cp {} "$RPM_FILE" \;

      - name: Build Arch package
        if: matrix.package_type == 'pkg.tar.zst'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          useradd -m builder

          mkdir -p archpkg
          cat > archpkg/PKGBUILD <<EOF
          # Maintainer: Linux Guardian Contributors <noreply@github.com>
          pkgname=linux-guardian
          pkgver=${VERSION}
          pkgrel=1
          pkgdesc="Lightning-fast Linux security scanner"
          arch=('x86_64')
          url="https://github.com/brammittendorff/linux-guardian"
          license=('MIT')
          depends=()
          options=('!debug' '!strip')

          package() {
              install -Dm755 "${GITHUB_WORKSPACE}/target/release/linux-guardian" "\${pkgdir}/usr/bin/linux-guardian"
              install -dm755 "\${pkgdir}/var/cache/linux-guardian"
          }
          EOF

          chown -R builder:builder . archpkg

          cd archpkg
          su builder -c "makepkg --skipinteg --skippgpcheck"

          mv linux-guardian-${VERSION}-1-${{ matrix.arch }}.pkg.tar.zst "../linux-guardian-${VERSION}-1-${{ matrix.arch }}.pkg.tar.zst"

      - name: Build Alpine APK package
        if: matrix.package_type == 'apk'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          mkdir -p ~/packages/main/x86_64
          mkdir -p ~/apkbuild
          mkdir -p ~/.abuild

          openssl genrsa -out ~/.abuild/builder.rsa 2048
          openssl rsa -in ~/.abuild/builder.rsa -pubout -out ~/.abuild/builder.rsa.pub

          cp ~/.abuild/builder.rsa.pub /etc/apk/keys/

          cat > ~/.abuild/abuild.conf <<ABCONF
          PACKAGER="Linux Guardian CI <noreply@github.com>"
          PACKAGER_PRIVKEY="$HOME/.abuild/builder.rsa"
          ABCONF

          cat > ~/apkbuild/APKBUILD <<EOF
          # Maintainer: Linux Guardian Contributors <noreply@github.com>
          pkgname=linux-guardian
          pkgver=${VERSION}
          pkgrel=0
          pkgdesc="Lightning-fast Linux security scanner"
          url="https://github.com/brammittendorff/linux-guardian"
          arch="x86_64"
          license="MIT"
          options="!check"

          package() {
              install -Dm755 "${GITHUB_WORKSPACE}/target/release/linux-guardian" "\$pkgdir/usr/bin/linux-guardian"
              install -dm755 "\$pkgdir/var/cache/linux-guardian"
          }
          EOF

          cd ~/apkbuild
          abuild -F
          find ~/packages -name "*.apk" -exec cp {} "${GITHUB_WORKSPACE}/linux-guardian-${VERSION}-r0.${{ matrix.arch }}.apk" \;

      - name: Upload package artifact
        uses: actions/upload-artifact@v6
        with:
          name: package-${{ matrix.distro }}-${{ matrix.version }}-${{ matrix.arch }}
          path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
            *.apk

      - name: Generate checksums
        shell: bash
        run: |
          shopt -s nullglob
          packages=(*.deb *.rpm *.pkg.tar.zst *.apk)
          if [ ${#packages[@]} -gt 0 ]; then
            sha256sum "${packages[@]}" > SHA256SUMS-${{ matrix.distro }}-${{ matrix.version }}
            sha512sum "${packages[@]}" > SHA512SUMS-${{ matrix.distro }}-${{ matrix.version }}
            echo "Generated checksums for: ${packages[@]}"
          else
            echo "No package files found to checksum"
            exit 1
          fi

      - name: Generate build provenance (attestation)
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: |
            *.deb
            *.rpm
            *.pkg.tar.zst
            *.apk

      - name: Upload to release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.deb
            *.rpm
            *.pkg.tar.zst
            *.apk
            SHA256SUMS-*
            SHA512SUMS-*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-repo:
    name: Publish package repository
    needs: build-packages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Install tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev apt-utils gnupg createrepo-c

      - name: Download all package artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: package-*

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "GPG_PRIVATE_KEY secret not set - repository will not be signed"
            echo "GPG_AVAILABLE=false" >> $GITHUB_ENV
            exit 0
          fi
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          mkdir -p ~/.gnupg
          echo "allow-loopback-pinentry" >> ~/.gnupg/gpg-agent.conf
          gpg-connect-agent reloadagent /bye 2>/dev/null || true
          # Cache passphrase in agent
          echo "test" | gpg --batch --pinentry-mode loopback --passphrase "$GPG_PASSPHRASE" --sign --output /dev/null 2>/dev/null || true
          echo "GPG_AVAILABLE=true" >> $GITHUB_ENV

          # Export public key for the repository
          mkdir -p site/
          gpg --armor --export > site/gpg.key
          echo "Exported public GPG key to site/gpg.key"

      - name: Build APT repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          mkdir -p site/deb/pool/main/l/linux-guardian

          # Collect all .deb files
          find artifacts/ -name "*.deb" -exec cp {} site/deb/pool/main/l/linux-guardian/ \;

          DEB_COUNT=$(find site/deb/pool/main/l/linux-guardian -name "*.deb" | wc -l)
          echo "Found $DEB_COUNT .deb packages"

          if [ "$DEB_COUNT" -eq 0 ]; then
            echo "No .deb packages found, skipping APT repo"
            exit 0
          fi

          # Create per-codename dists so each distro gets the right glibc-compatible binary
          declare -A CODENAMES=(
            ["debian-bookworm"]="bookworm"
            ["debian-bullseye"]="bullseye"
            ["ubuntu-noble"]="noble"
            ["ubuntu-jammy"]="jammy"
          )

          cd site/deb

          for distro_version in "${!CODENAMES[@]}"; do
            codename="${CODENAMES[$distro_version]}"
            mkdir -p "dists/${codename}/main/binary-amd64"

            # Find matching .deb for this distro
            matching_deb=$(find pool/ -name "*_${distro_version}_*.deb" | head -1)
            if [ -z "$matching_deb" ]; then
              echo "No .deb found for ${distro_version}, skipping"
              continue
            fi

            echo "Building dist for ${codename} from ${matching_deb}"

            # Create a temporary pool with just this distro's deb
            mkdir -p "tmp_pool/${codename}"
            cp "$matching_deb" "tmp_pool/${codename}/"
            dpkg-scanpackages "tmp_pool/${codename}/" /dev/null | sed "s|tmp_pool/${codename}/|pool/main/l/linux-guardian/|" > "dists/${codename}/main/binary-amd64/Packages"
            gzip -k "dists/${codename}/main/binary-amd64/Packages"
            rm -rf "tmp_pool/${codename}"

            # Generate Release file
            cd "dists/${codename}"
            cat > Release <<EOF
          Origin: linux-guardian
          Label: Linux Guardian
          Suite: ${codename}
          Codename: ${codename}
          Architectures: amd64
          Components: main
          Description: Linux Guardian packages for ${codename}
          EOF

            apt-ftparchive release . >> Release

            # Sign Release file
            if [ "$GPG_AVAILABLE" = "true" ]; then
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --armor --detach-sign -o Release.gpg Release
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --armor --clearsign -o InRelease Release
              echo "Signed ${codename} release"
            fi

            cd "$GITHUB_WORKSPACE/site/deb"
          done

          rm -rf tmp_pool

          # Also create a "stable" dist using the oldest glibc build (bullseye) as fallback
          if [ -d "dists/bullseye" ]; then
            cp -r dists/bullseye dists/stable
            echo "Created stable dist from bullseye (broadest compatibility)"
          fi

      - name: Build RPM repository
        env:
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          # Create per-distro RPM repos
          declare -A RPM_DISTROS=(
            ["fedora40"]="fedora/40"
            ["fedora39"]="fedora/39"
            ["rockylinux9"]="el/9"
          )

          for distro_key in "${!RPM_DISTROS[@]}"; do
            repo_path="${RPM_DISTROS[$distro_key]}"
            mkdir -p "site/rpm/${repo_path}/x86_64"

            # Find matching RPM
            matching_rpm=$(find artifacts/ -name "*${distro_key}*.rpm" | head -1)
            if [ -z "$matching_rpm" ]; then
              echo "No RPM found for ${distro_key}, skipping"
              continue
            fi

            echo "Building RPM repo for ${repo_path} from ${matching_rpm}"
            cp "$matching_rpm" "site/rpm/${repo_path}/x86_64/"
            createrepo_c "site/rpm/${repo_path}/x86_64/"

            if [ "$GPG_AVAILABLE" = "true" ]; then
              echo "$GPG_PASSPHRASE" | gpg --batch --yes --pinentry-mode loopback --passphrase-fd 0 --armor --detach-sign -o "site/rpm/${repo_path}/x86_64/repodata/repomd.xml.asc" "site/rpm/${repo_path}/x86_64/repodata/repomd.xml"
              echo "Signed ${repo_path} RPM repo"
            fi
          done

          # Create .repo file for Fedora (uses $releasever)
          cat > site/rpm/linux-guardian.repo <<'EOF'
          [linux-guardian]
          name=Linux Guardian
          baseurl=https://brammittendorff.github.io/linux-guardian/rpm/fedora/$releasever/x86_64
          enabled=1
          gpgcheck=1
          gpgkey=https://brammittendorff.github.io/linux-guardian/gpg.key
          EOF

          # Create EL-specific .repo file for Rocky/RHEL/AlmaLinux
          cat > site/rpm/linux-guardian-el.repo <<'EOF'
          [linux-guardian]
          name=Linux Guardian
          baseurl=https://brammittendorff.github.io/linux-guardian/rpm/el/$releasever/x86_64
          enabled=1
          gpgcheck=1
          gpgkey=https://brammittendorff.github.io/linux-guardian/gpg.key
          EOF

      - name: Create index page
        run: |
          touch site/.nojekyll
          cat > site/index.html <<'HTMLEOF'
          <!DOCTYPE html>
          <html>
          <head><title>Linux Guardian Package Repository</title></head>
          <body>
          <h1>Linux Guardian Package Repository</h1>
          <h2>Debian / Ubuntu</h2>
          <pre>
          curl -fsSL https://brammittendorff.github.io/linux-guardian/gpg.key | sudo gpg --dearmor -o /usr/share/keyrings/linux-guardian.gpg
          echo "deb [arch=amd64 signed-by=/usr/share/keyrings/linux-guardian.gpg] https://brammittendorff.github.io/linux-guardian/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/linux-guardian.list
          sudo apt update
          sudo apt install linux-guardian
          </pre>
          <h2>Fedora</h2>
          <pre>
          sudo dnf config-manager addrepo --from-repofile=https://brammittendorff.github.io/linux-guardian/rpm/linux-guardian.repo
          sudo dnf install linux-guardian
          </pre>
          <h2>RHEL / Rocky Linux / AlmaLinux</h2>
          <pre>
          sudo dnf config-manager addrepo --from-repofile=https://brammittendorff.github.io/linux-guardian/rpm/linux-guardian-el.repo
          sudo dnf install linux-guardian
          </pre>
          <h2>From source</h2>
          <pre>
          git clone https://github.com/brammittendorff/linux-guardian.git
          cd linux-guardian
          cargo build --release
          sudo cp target/release/linux-guardian /usr/local/bin/
          </pre>
          <p><a href="https://github.com/brammittendorff/linux-guardian">GitHub Repository</a></p>
          </body>
          </html>
          HTMLEOF

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
